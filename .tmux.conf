# Match the GNU screen command key from ~/.screenrc: Ctrl-e.
unbind C-b
set -g prefix C-e
bind e send-prefix

# Keep status and pane behavior predictable for full-screen TUIs like Codex.
set -g status on
set -g status-position bottom
set -g status-left "#{?client_prefix,#[reverse]PREFIX#[default] ,}#S:#I.#P "
setw -g window-status-current-format "#I:#W [#{P:#{?pane_active,*,}#{pane_index}:#{pane_title} }]#{?window_flags,#{window_flags}, }"
set -g renumber-windows on
set -g base-index 0
setw -g pane-base-index 0
set -g focus-events on
set -g escape-time 10
set -g mouse on
set -s copy-command 'if [ -n "$WAYLAND_DISPLAY" ] && command -v wl-copy >/dev/null 2>&1; then exec wl-copy; elif command -v xclip >/dev/null 2>&1; then exec xclip -selection clipboard -in; elif command -v xsel >/dev/null 2>&1; then exec xsel --clipboard --input; else exec cat >/dev/null; fi'

# Make split borders visible and redraw-friendly.
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour245
set -g pane-border-lines single
set -g pane-border-status top
set -g pane-border-format " #{pane_index}:#{pane_title} "

# Screen-style pane focus keys.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind g display-panes -b -d 0 'swap-pane -t "%%"'

# Screen-style actions from ~/.screenrc.
bind Space choose-tree -Zw
bind a command-prompt -I "#W" "rename-window '%%'"
bind s split-window -v
bind | split-window -h
bind - split-window -v
bind x break-pane -d
bind X confirm-before -p "kill pane #P? (y/n)" kill-pane
bind . paste-buffer

# Send literal Ctrl-e with Ctrl-e e, matching screen's "escape ^Ee".
bind C-e send-prefix

# Direct rxvt-style function key bindings from ~/.screenrc.
bind -n F1 next-window
bind -n F2 previous-window
bind -n F3 select-pane -t :.+
bind -n F4 select-pane -t :.-
bind -n F8 command-prompt -p "pane title:" -I "#{pane_title}" "select-pane -T '%%'"

# Handy redraw if a full-screen app leaves stale borders.
bind r refresh-client -S
